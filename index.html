<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>处罚结果生成器</title>
    <link rel="icon" href="/icon.png" />
    <script>
      try {
        var d = JSON.parse(localStorage.getItem('punishment-data-v3'))
        if (d && d.darkMode) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <style>
      html.dark body {
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
