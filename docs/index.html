      try {
        var d = JSON.parse(localStorage.getItem('punishment-data-v3'))
        var theme = d && d.darkMode ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', theme)
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light')
      }
    </script>

        background: #0f172a;
      }
